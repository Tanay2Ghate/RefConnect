<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - RefConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.checkAuth) return;
            const user = await window.checkAuth();
            if (!user) return;

            document.getElementById('logoutBtn').addEventListener('click', async (e) => {
                e.preventDefault();
                await window.logout();
            });

            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('id');
            
            if (!jobId) {
                document.getElementById('job-content').innerHTML = '<div class="text-danger p-4">Job ID not found. <a href="jobs.html">Back to Jobs</a></div>';
                return;
            }

            let jobDetails = null;

            const loadJob = async () => {
                try {
                    const res = await window.api.get(`/api/jobs/${jobId}`);
                    if (!res.success) throw new Error(res.message);
                    
                    jobDetails = res.data;
                    document.getElementById('j-title').textContent = jobDetails.title;
                    document.getElementById('j-company').textContent = jobDetails.company_name;
                    document.getElementById('j-location').textContent = `📍 ${jobDetails.location}`;
                    document.getElementById('j-salary').textContent = `💰 ₹${jobDetails.salary ? jobDetails.salary.toLocaleString() : 'Not specified'}`;
                    document.getElementById('j-deadline').textContent = `⏰ Deadline: ${new Date(jobDetails.deadline).toLocaleDateString()}`;
                    document.getElementById('j-desc').textContent = jobDetails.description;

                    const skillsContainer = document.getElementById('j-skills');
                    skillsContainer.innerHTML = '';
                    if(jobDetails.skills && jobDetails.skills.length > 0) {
                        jobDetails.skills.forEach(s => {
                            skillsContainer.innerHTML += `<span class="badge badge-info">${s}</span>`;
                        });
                    } else {
                        skillsContainer.innerHTML = '<span class="text-muted">No specific skills listed.</span>';
                    }

                    // Check application status
                    const appsRes = await window.api.get('/api/applications');
                    const myApp = appsRes.success ? appsRes.data.find(a => a.job_id == jobId) : null;

                    const actionsDiv = document.getElementById('j-actions');
                    
                    if (user.role === 'recruiter') {
                        if (jobDetails.recruiter_id === user.user_id) {
                            actionsDiv.innerHTML = `<p class="text-success font-medium">You posted this job.</p>
                                <button id="deleteJobBtn" class="btn btn-danger mt-2">Delete Job</button>`;
                            
                            document.getElementById('deleteJobBtn').addEventListener('click', async () => {
                                if(confirm('Are you sure you want to delete this job?')) {
                                    const dRes = await window.api.delete(`/api/jobs/${jobId}`);
                                    if(dRes.success) {
                                        window.showToast("Job deleted", "success");
                                        setTimeout(()=> window.location.href = 'jobs.html', 1000);
                                    } else {
                                        window.showToast(dRes.message, "error");
                                    }
                                }
                            });
                        }
                    } else {
                        if (myApp) {
                            actionsDiv.innerHTML = `
                                <div class="bg-card p-4 rounded border border-glass">
                                    <p class="font-medium">Application Status</p>
                                    <span class="badge badge-${myApp.status} mt-2">${myApp.status.toUpperCase()}</span>
                                </div>
                            `;
                        } else {
                            actionsDiv.innerHTML = `
                                <button id="applyBtn" class="btn btn-primary">Easy Apply</button>
                                <button id="reqRefBtn" class="btn btn-outline ml-4">Request Referral</button>
                            `;

                            document.getElementById('applyBtn').addEventListener('click', async () => {
                                document.getElementById('applyBtn').disabled = true;
                                const applyRes = await window.api.post('/api/applications', { job_id: jobId });
                                if (applyRes.success) {
                                    window.showToast("Successfully applied!", "success");
                                    loadJob(); // reload to show status
                                } else {
                                    window.showToast(applyRes.message, "error");
                                    document.getElementById('applyBtn').disabled = false;
                                }
                            });

                            document.getElementById('reqRefBtn').addEventListener('click', () => {
                                loadConnectionsForReferral();
                                document.getElementById('refModal').style.display = 'flex';
                            });
                        }
                    }

                } catch (error) {
                    document.getElementById('job-content').innerHTML = '<div class="text-danger p-4">Failed to load job details.</div>';
                }
            };

            const loadConnectionsForReferral = async () => {
                const select = document.getElementById('referrerSelect');
                select.innerHTML = '<option value="">Loading connections...</option>';
                try {
                    const res = await window.api.get('/api/connections');
                    if(res.success) {
                        if(res.data.length === 0) {
                            select.innerHTML = '<option value="" disabled>You have no connections to ask for a referral</option>';
                        } else {
                            select.innerHTML = '<option value="" disabled selected>Select a connection...</option>';
                            res.data.forEach(c => {
                                select.innerHTML += `<option value="${c.user_id}">${c.name} (${c.role})</option>`;
                            });
                        }
                    }
                } catch(e) {
                    select.innerHTML = '<option value="" disabled>Error loading connections</option>';
                }
            };

            document.getElementById('closeRefModalBtn').addEventListener('click', () => {
                document.getElementById('refModal').style.display = 'none';
            });

            document.getElementById('refForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const referrer_id = document.getElementById('referrerSelect').value;
                const message = document.getElementById('refMessage').value;
                
                if(!referrer_id) {
                    window.showToast("Please select a connection", "error");
                    return;
                }

                const btn = document.getElementById('sendRefBtn');
                btn.disabled = true;

                try {
                    const res = await window.api.post('/api/referrals/request', {
                        referrer_id,
                        job_id: jobId,
                        message
                    });
                    if(res.success) {
                        window.showToast("Referral requested!", "success");
                        document.getElementById('refModal').style.display = 'none';
                    } else {
                        window.showToast(res.message, "error");
                    }
                } catch(e) {
                    window.showToast("Error requesting referral", "error");
                } finally {
                    btn.disabled = false;
                }
            });

            loadJob();
        });
    </script>
</head>
<body class="page-layout">
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>RefConnect</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <a href="jobs.html" class="nav-link active">Jobs</a>
            <a href="connections.html" class="nav-link">My Network</a>
            <a href="referrals.html" class="nav-link">Referrals</a>
            <a href="applications.html" class="nav-link">Applications</a>
            <a href="#" class="nav-link" id="logoutBtn">Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mb-4">
            <a href="jobs.html" class="text-accent hover-underline">← Back to Jobs</a>
        </div>

        <section id="job-content" class="card glass-card">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 id="j-title" class="mb-2">Loading...</h1>
                    <h2 id="j-company" class="text-accent font-medium text-lg"></h2>
                </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <p id="j-location" class="text-muted"></p>
                <p id="j-salary" class="text-muted"></p>
                <p id="j-deadline" class="text-muted"></p>
            </div>

            <div class="mb-6">
                <h3 class="mb-2">Required Skills</h3>
                <div id="j-skills" class="flex gap-2 flex-wrap"></div>
            </div>

            <div class="mb-8">
                <h3 class="mb-2">Job Description</h3>
                <p id="j-desc" class="text-secondary" style="white-space: pre-wrap;"></p>
            </div>

            <div id="j-actions" class="border-t border-glass pt-6 mt-6">
                <!-- Buttons injected here -->
            </div>
        </section>
    </main>

    <!-- Request Referral Modal -->
    <div id="refModal" class="modal-overlay" style="display:none;">
        <div class="modal card glass-card">
            <h2>Request Referral</h2>
            <p class="text-muted mb-4 text-sm">Ask a connection to refer you for this job.</p>
            <form id="refForm">
                <div class="form-group">
                    <label class="form-label">Select Connection</label>
                    <select id="referrerSelect" class="form-select" required>
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Message (Optional)</label>
                    <textarea id="refMessage" class="form-input" rows="3" placeholder="Explain why you are a good fit..."></textarea>
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="submit" class="btn btn-primary" id="sendRefBtn">Send Request</button>
                    <button type="button" class="btn btn-outline" id="closeRefModalBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
