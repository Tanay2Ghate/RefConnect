<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — RefConnect</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-slideUp">
      <div class="auth-header">
        <a href="index.html">
          <div class="brand-icon">R</div>
        </a>
        <h1>Create your account</h1>
        <p>Join RefConnect and start your referral journey</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input
            type="text"
            id="reg-name"
            class="form-input"
            placeholder="John Doe"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input
            type="email"
            id="reg-email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              class="form-input"
              placeholder="Min 6 characters"
              required
              autocomplete="new-password"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-confirm-password">Confirm Password</label>
            <input
              type="password"
              id="reg-confirm-password"
              class="form-input"
              placeholder="Repeat password"
              required
              autocomplete="new-password"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-role">I am a…</label>
          <select id="reg-role" class="form-select" required>
            <option value="" disabled selected>Select your role</option>
            <option value="student">Student</option>
            <option value="alumni">Alumni</option>
            <option value="employee">Employee</option>
            <option value="recruiter">Recruiter</option>
          </select>
        </div>

        <div id="register-error" class="form-error mb-md"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js" defer></script>
  <script src="js/auth.js" defer></script>
</body>
</html>
